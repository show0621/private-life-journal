name: Deploy Cloudflare Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "worker/**"
      - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Resolve KV namespace
        id: kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_KV_NAMESPACE_ID: ${{ secrets.CLOUDFLARE_KV_NAMESPACE_ID }}
        run: |
          if [ -n "$CLOUDFLARE_KV_NAMESPACE_ID" ]; then
            echo "id=$CLOUDFLARE_KV_NAMESPACE_ID" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ID=$(npx wrangler kv namespace create VAULT --json | jq -r '.id')
          echo "id=$ID" >> "$GITHUB_OUTPUT"
          echo "::warning::Created KV namespace $ID — add it to GitHub secret CLOUDFLARE_KV_NAMESPACE_ID"

      - name: Write wrangler config
        run: |
          cat > wrangler.generated.toml <<EOF
          name = "life-journal-sync"
          main = "src/index.ts"
          compatibility_date = "2024-01-01"

          [[kv_namespaces]]
          binding = "VAULT"
          id = "${{ steps.kv.outputs.id }}"
          EOF

      - name: Deploy Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config wrangler.generated.toml

      - name: Show Worker URL
        run: echo "Worker deployed. URL=https://life-journal-sync.<your-subdomain>.workers.dev"
